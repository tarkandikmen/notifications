name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: go mod download
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
      # Phase 2 §13 / §Chunk 7: gate the testcontainer-backed tests behind
      # TEST_INTEGRATION=1 so `go test ./...` stays fast for unit-only
      # contributors. ubuntu-latest ships Docker preinstalled, so
      # testcontainers-go boots Postgres and Kafka without extra setup.
      - run: TEST_INTEGRATION=1 go test -timeout 5m ./internal/itest/... ./internal/store/... ./internal/dispatcher/... ./internal/relay/... ./internal/worker/... ./internal/reaper/...
