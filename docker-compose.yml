# docker-compose.yml - Phase 1 topology.
# Locked by docs/phases/01-foundation.md §9. Subsequent phases inherit this
# service set without modification (the stub services already declare the
# kafka and redis health dependencies they will use in Phase 2+).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: notif-kafka-cluster-id-0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "9092:9092"

  migrate:
    build: .
    restart: "no"
    command: ["migrate", "up"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy

  # kafka-bootstrap is the one-shot topic creation step. Mirrors the
  # `migrate` pattern: every service that talks to Kafka waits for this
  # to complete before starting, so the dispatcher's lag-aware ticks
  # don't fire against topics that don't exist yet (which would surface
  # as fail-open UNKNOWN_TOPIC_OR_PARTITION warnings on every tick
  # until franz-go's metadata refresh catches up). Phase 3 resilience
  # cold-start fix.
  kafka-bootstrap:
    build: .
    restart: "no"
    command: ["kafka-bootstrap"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      kafka:
        condition: service_healthy

  api:
    build: .
    command: ["api"]
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  dispatcher:
    build: .
    command: ["dispatcher"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-bootstrap:
        condition: service_completed_successfully

  worker-sms:
    build: .
    command: ["worker", "--channel=sms"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker-email:
    build: .
    command: ["worker", "--channel=email"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker-push:
    build: .
    command: ["worker", "--channel=push"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  relay:
    build: .
    command: ["relay"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-bootstrap:
        condition: service_completed_successfully

  reaper:
    build: .
    command: ["reaper"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-bootstrap:
        condition: service_completed_successfully
